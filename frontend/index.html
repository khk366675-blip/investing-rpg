    /* CSS Variables & Base Styles */
    :root {
      --bg-gradient: radial-gradient(circle at center, #0e121a 0%, #030508 100%);
      --card-bg: linear-gradient(135deg, rgba(16, 20, 30, 0.9) 0%, rgba(8, 10, 15, 0.98) 100%);
      --color-text-primary: #f8fafc;
      --color-text-secondary: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      color: var(--color-text-primary);
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: auto;
      padding: 3rem 2rem;
    }

    header {
      margin-bottom: 3rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #fff 30%, #ffdf00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--color-text-secondary);
      font-size: 1rem;
    }

    /* Container for horizontal card compare render */
    .compare-container {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 1200px;
    }

    /* Card Container with Dynamic Color Variable Borders */
    .card-container {
      width: 360px;
      height: 645px;
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 
                  0 0 20px var(--color-primary-glow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    /* Double border effect for Legendary Frame using color variables */
    .card-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 24px;
      padding: 2.5px;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 50%, var(--color-accent) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .card-container:hover {
      transform: translateY(-12px) scale(1.015);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 
                  0 0 35px var(--color-primary);
    }

    /* Swapped Text Layout Header */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 10;
    }

    .title-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Race name is now MAIN */
    .race-main-title {
      font-size: 1.45rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .ticker-sub-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Ticker name is now SUB-MAIN */
    .ticker-sub-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color-primary);
      text-shadow: 0 0 8px var(--color-primary-glow);
    }

    .sector-badge {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--color-text-secondary);
      background: rgba(255, 255, 255, 0.05);
      padding: 1px 6px;
      border-radius: 4px;
    }

    .rarity-tag {
      font-family: 'Outfit', sans-serif;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--color-primary);
      text-shadow: 0 0 8px var(--color-primary-glow);
      border: 1.5px solid var(--color-primary);
      padding: 3px 8px;
      border-radius: 6px;
      background: var(--color-primary-glow);
    }

    /* Character Graphic Viewport */
    .card-graphic-wrapper {
      width: 100%;
      height: 250px;
      background: radial-gradient(circle at center, rgba(20, 24, 36, 0.5) 0%, rgba(5, 7, 10, 0.9) 100%);
      border-radius: 16px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Glowing Radial Aura using variables */
    .aura-circle {
      fill: url(#auraGlow);
    }

    /* Keyframe Animations */
    @keyframes pulse {
      0% { transform: scale(1); filter: drop-shadow(0 0 2px var(--color-accent)); }
      50% { transform: scale(1.15); filter: drop-shadow(0 0 10px var(--color-accent)); }
      100% { transform: scale(1); filter: drop-shadow(0 0 2px var(--color-accent)); }
    }
    
    .pulse-heart {
      animation: pulse 1.8s infinite ease-in-out;
      transform-origin: 200px 242px;
    }

    .pulse-heart-giant {
      animation: pulse 1.8s infinite ease-in-out;
      transform-origin: 200px 282px;
    }

    /* Level Stars */
    .level-tier-stars {
      display: flex;
      justify-content: center;
      gap: 4px;
      z-index: 10;
    }

    .star-icon {
      width: 16px;
      height: 16px;
      fill: var(--color-primary);
      filter: drop-shadow(0 0 4px var(--color-primary-glow));
    }

    /* Stats Panel */
    .stats-panel {
      display: flex;
      flex-direction: column;
      gap: 9px;
      z-index: 10;
    }

    .stat-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
    }

    .stat-label-container {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--color-text-secondary);
    }

    .stat-name-box {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-highlight {
      color: #fff;
      font-weight: 700;
    }

    .stat-value {
      font-weight: 700;
      color: var(--color-text-primary);
    }

    /* Stat bar */
    .stat-bar-bg {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .stat-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: #475569;
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Dominant Stat HP highlight */
    .stat-row.dominant .stat-highlight {
      color: var(--color-primary);
      text-shadow: 0 0 8px var(--color-primary-glow);
    }

    .stat-row.dominant .stat-bar-fill {
      background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-accent) 100%);
      box-shadow: 0 0 10px var(--color-primary-glow);
    }

    /* Estimated badge for DEF */
    .estimated-pill {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--color-accent);
      background: var(--color-accent-glow);
      border: 1px solid var(--color-accent);
      padding: 0 4px;
      border-radius: 4px;
      cursor: help;
    }

    /* Interactive Provenance Tooltip */
    .provenance-tooltip {
      position: absolute;
      top: -245px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      width: 310px;
      background: rgba(10, 14, 24, 0.98);
      border: 1.5px solid var(--color-accent);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8), 0 0 20px var(--color-accent-glow);
      border-radius: 12px;
      padding: 16px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    .stat-row:hover .provenance-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .tooltip-header {
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tooltip-header span:first-child {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--color-accent);
      color: #000;
      font-weight: 800;
    }

    .tooltip-body {
      font-size: 0.75rem;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 6px;
      color: #cbd5e1;
    }

    .tooltip-item {
      display: flex;
      justify-content: space-between;
    }

    .tooltip-label {
      color: var(--color-text-secondary);
    }

    .tooltip-value {
      font-weight: 600;
      color: #f1f5f9;
    }

    .tooltip-note {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed rgba(255, 255, 255, 0.08);
      font-size: 0.7rem;
      color: #94a3b8;
      font-style: italic;
    }

    /* Footer Area */
    .card-footer {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }

    .card-subfaction-desc {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-text-primary);
      letter-spacing: 0.05em;
    }

    .card-type-label {
      font-size: 0.7rem;
      color: var(--color-text-secondary);
      margin-top: 2px;
      letter-spacing: 0.1em;
    }

            <circle cx="295" cy="85" r="4" fill="#fff" />

          </g>
        );
      } else if (raceBodyType === "화염거인_체형") {
        // --- 3. 화염거인 체형 (Bulky Giant): 거대하고 육중한 덩치, 둥근 어깨, 머리 불꽃돌기 마커 ---
        return (
          <g transform={`translate(200, 240) scale(${size}) translate(-200,-200)`}>
            {/* Fiery Head Spikes (불꽃돌기 - 종족 마커) */}
            <path d="M195 90 L200 45 L205 90 Z" fill="var(--color-accent)" filter="url(#visorGlow)" />

    // React Character Card Component
    function CharacterCard({ spec }) {
      const {
        ticker,
        race,
        sectorLabel,
        size,
        aura,
        levelTier,
        rarityFrame,
        dominantStat,
        estimatedBadge,
        stats,
        provenance
      } = spec;

      // Hex mappings
      const primaryColor = colorMap[spec.palette.primary] || "#475569";
      const secondaryColor = colorMap[spec.palette.secondary] || "#64748b";
      const accentColor = colorMap[spec.palette.accent] || "#e2e8f0";

      // Inline card styles utilizing CSS Variables scoped to the card
      const cardStyle = {
        "--color-primary": primaryColor,
        "--color-secondary": secondaryColor,
        "--color-accent": accentColor,
        "--color-primary-glow": `${primaryColor}33`, /* opacity 0.2 */
        "--color-accent-glow": `${accentColor}26`,  /* opacity 0.15 */
      };

      const renderStars = () => {
        const stars = [];
        for (let i = 0; i < levelTier; i++) {
          stars.push(<Star key={i} />);
        }
        return stars;
      };

      return (
        <div className="card-container" style={cardStyle}>
          {/* Swapped Text Layout: Race MAIN, Ticker SUB-MAIN */}
          <div className="card-header">
            <div className="title-section">
              <h2 className="race-main-title">{race}</h2>
              <div className="ticker-sub-row">
                <span className="ticker-sub-title">{ticker}</span>
                <span className="sector-badge">{sectorLabel}</span>
              </div>
            </div>
            <div className="rarity-tag">{rarityFrame.toUpperCase()}</div>
          </div>

          {/* Graphic Viewport */}
          <div className="card-graphic-wrapper">
            <svg width="100%" height="100%" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
              <defs>
                {/* Aura gradient glow based on spec.aura */}
                <radialGradient id="auraGlow" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor="var(--color-accent)" stopOpacity={aura} />
                  <stop offset="40%" stopColor="var(--color-primary)" stopOpacity={aura * 0.5} />
                  <stop offset="100%" stopColor="#000" stopOpacity="0" />
                </radialGradient>
                
                {/* Visor glowing filter */}
                <filter id="visorGlow" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur stdDeviation="3" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>

              {/* Aura Background */}
              <circle cx="200" cy="200" r="165" className="aura-circle" />

              {/* Character Silhouettes (Split based on raceBodyType) */}
              <CharacterSilhouette 
                raceBodyType={spec.raceBodyType} 
                size={size} 
                aura={aura} 
              />
            </svg>
          </div>

          {/* Level Stars */}
          <div className="level-tier-stars">
            {renderStars()}
          </div>

          {/* Stats list & hovers */}
          <div className="stats-panel">
            {Object.entries(stats).map(([statName, val]) => {
              const isDominant = statName === dominantStat;
              const isEstimated = estimatedBadge.stats.includes(statName);
              const prov = provenance[statName];
              
              const labelMap = {
                "HP": "HP",
                "ATK": "ATK (공격)",
                "DEF": "DEF (방어)",
                "SPD": "SPD (속도)",
                "CRIT": "CRIT (치명)",
                "REGEN": "REGEN (재생)",
                "숙련": "숙련도"
              };

              return (
                <div key={statName} className={`stat-row ${isDominant ? 'dominant' : ''}`}>
                  <div className="stat-label-container">
                    <div className="stat-name-box">
                      <span className="stat-highlight">{labelMap[statName]}</span>
                      {isEstimated && (
                        <span className="estimated-pill">추정</span>
                      )}
                    </div>
                    <span className="stat-value">{val}</span>
                  </div>
                  <div className="stat-bar-bg">
                    <div 
                      className="stat-bar-fill" 
                      style={{ width: `${(val / 1000) * 100}%` }}
                    />
                  </div>

                  {/* Floating Provenance Tooltip */}
                  {prov && (
                    <div className="provenance-tooltip">
                      <div className="tooltip-header">
                        <span>{prov.stat} Provenance Trail</span>
                        {prov.estimated && <span>추정값</span>}
                      </div>
                      <div className="tooltip-body">
                        <div className="tooltip-item">
                          <span className="tooltip-label">스탯 축 (Axis):</span>
                          <span className="tooltip-value">{prov.axis}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">지표 (Metric):</span>
                          <span className="tooltip-value">{prov.source_metric}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">섹터 백분위:</span>
                          <span className="tooltip-value">{(prov.sector_percentile * 100).toFixed(2)}%</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">레벨 배율:</span>
                          <span className="tooltip-value">{prov.lvl_mult.toFixed(4)}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">기본 능력치 (Base):</span>
                          <span className="tooltip-value">{prov.base_value}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">원천 수치 (Raw):</span>
                          <span className="tooltip-value">
                            {prov.raw_value === null ? "None" : (typeof prov.raw_value === 'object' ? JSON.stringify(prov.raw_value) : prov.raw_value.toString())}
                          </span>
                        </div>
                        <div className="tooltip-note">
                          <strong>Note:</strong> {prov.note}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Subfaction & Type labels in Footer */}
          <div className="card-footer">
            <div className="card-subfaction-desc">{spec.subfaction} 분파 ({spec.ticker})</div>
            <div className="card-type-label">{spec.type}</div>
          </div>
        </div>
      );
    }

    // App view rendering 3 cards side-by-side
    function App() {
      return (
        <div className="compare-container">
          <CharacterCard spec={portfolioSpecs.JPM} />
          <CharacterCard spec={portfolioSpecs.NVDA} />
          <CharacterCard spec={portfolioSpecs.XOM} />
        </div>
      );
    }

    // Mount point
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);

  </script>
</body>
