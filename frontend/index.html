<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investing RPG - 캐릭터 카드 렌더러 (JPM)</title>
  
  <!-- React 18 & Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts: Outfit, Inter, Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    /* CSS Variables & Palette mapping */
    :root {
      --bg-gradient: radial-gradient(circle at center, #0f1319 0%, #05070a 100%);
      --card-bg: linear-gradient(135deg, rgba(20, 25, 38, 0.85) 0%, rgba(10, 12, 18, 0.95) 100%);
      
      /* Hex Mapping for Gold, Bronze, Ruby from spec.palette */
      --color-gold: #ffdf00;
      --color-gold-glower: rgba(255, 223, 0, 0.35);
      --color-bronze: #cd7f32;
      --color-ruby: #e0115f;
      --color-ruby-glow: rgba(224, 17, 95, 0.5);
      
      --color-text-primary: #f8fafc;
      --color-text-secondary: #94a3b8;
      --color-border-legendary: linear-gradient(135deg, #ffdf00 0%, #cd7f32 50%, #e0115f 100%);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      color: var(--color-text-primary);
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 2rem;
    }

    header {
      margin-bottom: 2rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #fff 30%, #ffdf00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--color-text-secondary);
      font-size: 0.95rem;
    }

    /* Card Layout & Premium hover translation */
    .card-container {
      width: 380px;
      height: 640px;
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                  0 0 25px rgba(255, 223, 0, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    /* Double border effect for Legendary Frame */
    .card-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 24px;
      padding: 3px;
      background: var(--color-border-legendary);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .card-container:hover {
      transform: translateY(-12px) scale(1.015);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 
                  0 0 45px rgba(255, 223, 0, 0.35);
    }

    /* Card Header */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .ticker-section {
      display: flex;
      flex-direction: column;
    }

    .ticker-title {
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      line-height: 1.1;
    }

    .sector-badge {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--color-text-secondary);
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 8px;
      border-radius: 6px;
      width: fit-content;
      margin-top: 4px;
    }

    .rarity-tag {
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--color-gold);
      text-shadow: 0 0 8px var(--color-gold-glower);
      border: 1.5px solid var(--color-gold);
      padding: 4px 10px;
      border-radius: 8px;
      background: rgba(255, 223, 0, 0.08);
    }

    /* Graphic Area */
    .card-graphic-wrapper {
      width: 100%;
      height: 250px;
      background: radial-gradient(circle at center, rgba(30, 35, 50, 0.4) 0%, rgba(10, 12, 18, 0.8) 100%);
      border-radius: 16px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Pulse animation for Ruby heart */
    @keyframes pulse {
      0% { transform: scale(1); filter: drop-shadow(0 0 2px var(--color-ruby)); }
      50% { transform: scale(1.15); filter: drop-shadow(0 0 10px var(--color-ruby)); }
      100% { transform: scale(1); filter: drop-shadow(0 0 2px var(--color-ruby)); }
    }
    
    .pulse-heart {
      animation: pulse 1.8s infinite ease-in-out;
      transform-origin: 200px 242px; /* Center of the heart */
    }

    /* Star Level Tier display */
    .level-tier-stars {
      display: flex;
      justify-content: center;
      gap: 4px;
      z-index: 10;
    }

    .star-icon {
      width: 18px;
      height: 18px;
      fill: var(--color-gold);
      filter: drop-shadow(0 0 4px var(--color-gold-glower));
    }

    /* Stats Panel */
    .stats-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .stat-row {
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
    }

    .stat-label-container {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--color-text-secondary);
    }

    .stat-name-box {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-highlight {
      color: #fff;
      font-weight: 700;
    }

    .stat-value {
      font-weight: 700;
      color: var(--color-text-primary);
    }

    /* Stat bar */
    .stat-bar-bg {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }

    .stat-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: #475569;
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Dominant Stat HP highlight */
    .stat-row.dominant .stat-highlight {
      color: var(--color-gold);
      text-shadow: 0 0 8px var(--color-gold-glower);
    }

    .stat-row.dominant .stat-bar-fill {
      background: linear-gradient(90deg, var(--color-gold) 0%, var(--color-ruby) 100%);
      box-shadow: 0 0 10px var(--color-gold-glower);
    }

    /* Estimated badge for DEF */
    .estimated-pill {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--color-ruby);
      background: rgba(224, 17, 95, 0.15);
      border: 1px solid var(--color-ruby);
      padding: 0 5px;
      border-radius: 4px;
      cursor: help;
      position: relative;
    }

    /* Interactive Provenance Tooltip */
    .provenance-tooltip {
      position: absolute;
      top: -245px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      width: 320px;
      background: rgba(15, 20, 32, 0.95);
      border: 1.5px solid var(--color-ruby);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8), 0 0 20px var(--color-ruby-glow);
      border-radius: 12px;
      padding: 16px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    .stat-row:hover .provenance-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .tooltip-header {
      font-size: 0.9rem;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tooltip-header span {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--color-ruby);
      color: #fff;
      font-weight: 800;
    }

    .tooltip-body {
      font-size: 0.75rem;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 6px;
      color: #cbd5e1;
    }

    .tooltip-item {
      display: flex;
      justify-content: space-between;
    }

    .tooltip-label {
      color: var(--color-text-secondary);
    }

    .tooltip-value {
      font-weight: 600;
      color: #f1f5f9;
    }

    .tooltip-note {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed rgba(255, 255, 255, 0.08);
      font-size: 0.7rem;
      color: #94a3b8;
      font-style: italic;
    }

    /* Footer / Name Area */
    .card-footer {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
    }

    .card-race-title {
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      color: var(--color-text-primary);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
    }

    .card-subfaction-desc {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      margin-top: 2px;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <header>
    <h1>Investing RPG</h1>
    <p>도형 렌더러 — Step 3b JPM 황금기사단 수직 슬라이스</p>
  </header>

  <!-- Mount Point for React -->
  <div id="root"></div>

  <script type="text/babel">

    // Target JPM AppearanceSpec JSON (directly containing stats and provenance)
    const jpmSpec = {
      "ticker": "JPM",
      "race": "황금기사단",
      "raceBodyType": "황금기사단_체형",
      "subfaction": "은행",
      "sectorLabel": "금융",
      "palette": {
        "primary": "Gold",
        "secondary": "Bronze",
        "accent": "Ruby"
      },
      "size": 0.7869,
      "aura": 0.6293,
      "levelTier": 4,
      "rarityFrame": "legendary",
      "accents": [
        "은행_휘장",
        "심장"
      ],
      "dominantStat": "HP",
      "estimatedBadge": {
        "enabled": true,
        "stats": [
          "DEF"
        ]
      },
      "type": "EQUITY",
      "stats": {
        "HP": 789,
        "ATK": 530,
        "DEF": 473,
        "SPD": 262,
        "CRIT": 205,
        "REGEN": 217,
        "숙련": 633
      },
      "provenance": {
        "HP": {
          "stat": "HP",
          "value": 789,
          "axis": "개인화",
          "source_metric": "shares * price",
          "raw_value": 1555.5500000000002,
          "sector": "Financial Services",
          "sector_percentile": 0.7871,
          "estimated": false,
          "note": "Log-scaled value: 7.3496 (Portfolio Range: 4.9032 - 8.0115)",
          "base_value": 789,
          "lvl_mult": 1.0,
          "final_value": 789
        },
        "ATK": {
          "stat": "ATK",
          "value": 530,
          "axis": "종목",
          "source_metric": "0.7 * Growth_score + 0.3 * Momentum",
          "raw_value": {
            "growth": 0.127,
            "momentum": 0.6492652157077977
          },
          "sector": "Financial Services",
          "sector_percentile": 0.6039,
          "estimated": false,
          "note": "Growth score: 0.5844 (raw), 52-week momentum: 0.6493",
          "base_value": 608,
          "lvl_mult": 0.8722,
          "final_value": 530
        },
        "DEF": {
          "stat": "DEF",
          "value": 473,
          "axis": "종목",
          "source_metric": "debtToEquity & currentRatio",
          "raw_value": null,
          "sector": "Financial Services",
          "sector_percentile": 0.5373,
          "estimated": true,
          "note": "Financial services fallback. D/E and CurrentRatio missing. Used ROE quality score (0.5373) as proxy.",
          "base_value": 542,
          "lvl_mult": 0.8722,
          "final_value": 473
        },
        "SPD": {
          "stat": "SPD",
          "value": 262,
          "axis": "종목",
          "source_metric": "beta",
          "raw_value": 1.0,
          "sector": "Financial Services",
          "sector_percentile": 0.5,
          "estimated": false,
          "note": "Beta: 1.0000",
          "base_value": 300,
          "lvl_mult": 0.8722,
          "final_value": 262
        },
        "CRIT": {
          "stat": "CRIT",
          "value": 205,
          "axis": "종목",
          "source_metric": "spread",
          "raw_value": 0.2837349168284421,
          "sector": "Financial Services",
          "sector_percentile": 0.5,
          "estimated": false,
          "note": "Spread: 0.2837",
          "base_value": 235,
          "lvl_mult": 0.8722,
          "final_value": 205
        },
        "REGEN": {
          "stat": "REGEN",
          "value": 217,
          "axis": "종목",
          "source_metric": "dividendYield",
          "raw_value": 0.019299999999999998,
          "sector": "Financial Services",
          "sector_percentile": 0.2412,
          "estimated": false,
          "note": "Dividend yield: 1.93%",
          "base_value": 249,
          "lvl_mult": 0.8722,
          "final_value": 217
        },
        "숙련": {
          "stat": "숙련",
          "value": 633,
          "axis": "종목",
          "source_metric": "returnOnEquity, operatingMargins, profitMargins",
          "raw_value": {
            "returnOnEquity": 0.16465063,
            "operatingMargins": 0.44853,
            "profitMargins": 0.35418
          },
          "sector": "Financial Services",
          "sector_percentile": 0.7227,
          "estimated": false,
          "note": "Averaged: ROE_score=0.5372815955036514, OpMargin_score=0.7988981050555399, ProfitMargin_score=0.8320249635278446",
          "base_value": 726,
          "lvl_mult": 0.8722,
          "final_value": 633
        }
      }
    };

    // React SVG Star Renderer Helper
    function Star() {
      return (
        <svg className="star-icon" viewBox="0 0 24 24">
          <polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9" />
        </svg>
      );
    }

    // React Character Card Component
    function CharacterCard({ spec }) {
      const {
        ticker,
        race,
        sectorLabel,
        size,
        aura,
        levelTier,
        rarityFrame,
        dominantStat,
        estimatedBadge,
        stats,
        provenance
      } = spec;

      // Render star tiers based on levelTier
      const renderStars = () => {
        const stars = [];
        for (let i = 0; i < levelTier; i++) {
          stars.push(<Star key={i} />);
        }
        return stars;
      };

      return (
        <div className="card-container">
          {/* 10. Header with ticker and sector label */}
          <div className="card-header">
            <div className="ticker-section">
              <span className="ticker-title">{ticker}</span>
              <span className="sector-badge">{sectorLabel}</span>
            </div>
            <div className="rarity-tag">{rarityFrame.toUpperCase()}</div>
          </div>

          {/* Graphic Area */}
          <div className="card-graphic-wrapper">
            {/* SVG Renderer */}
            <svg width="100%" height="100%" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
              <defs>
                {/* 4. Aura glow effect centered behind the character */}
                <radialGradient id="auraGlow" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor="var(--color-ruby)" stopOpacity={aura} />
                  <stop offset="40%" stopColor="var(--color-gold)" stopOpacity={aura * 0.5} />
                  <stop offset="100%" stopColor="#000" stopOpacity="0" />
                </radialGradient>
                
                {/* Visual filter for visor ruby glow */}
                <filter id="rubyNeon" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur stdDeviation="3" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>

              {/* Background Aura circle */}
              <circle cx="200" cy="200" r="160" fill="url(#auraGlow)" />

              {/* 3. Character group scaled by 'size' from center (200, 200) */}
              <g transform={`translate(200, 200) scale(${size}) translate(-200, -200)`}>
                {/* --- Knight Body Parts --- */}
                
                {/* Helmet Crest (Bronze) */}
                <path d="M170 100 L200 45 L230 100 Z" fill="var(--color-bronze)" stroke="#8c4800" strokeWidth="2" />
                
                {/* Helmet Dome (Gold) */}
                <path d="M155 140 C155 80 245 80 245 140 L240 160 L160 160 Z" fill="var(--color-gold)" stroke="var(--color-bronze)" strokeWidth="3" />
                
                {/* Visor Area (Dark) */}
                <rect x="168" y="125" width="64" height="22" rx="3" fill="#111" stroke="var(--color-bronze)" strokeWidth="2" />
                
                {/* Glowing Ruby Slit (Visor Neon Slit) */}
                <rect x="174" y="133" width="52" height="5" rx="1.5" fill="var(--color-ruby)" filter="url(#rubyNeon)" />

                {/* 1. Shoulder Pauldrons - Heavy Shoulder Armor (종족 마커) */}
                {/* Left Pauldron */}
                <path d="M80 180 C80 135 145 140 145 185 L120 220 Z" fill="var(--color-gold)" stroke="var(--color-bronze)" strokeWidth="3" />
                <polygon points="80,180 70,165 95,170" fill="var(--color-bronze)" stroke="#8c4800" strokeWidth="1" />
                <polygon points="85,195 72,190 92,185" fill="var(--color-bronze)" stroke="#8c4800" strokeWidth="1" />

                {/* Right Pauldron */}
                <path d="M320 180 C320 135 255 140 255 185 L280 220 Z" fill="var(--color-gold)" stroke="var(--color-bronze)" strokeWidth="3" />
                <polygon points="320,180 330,165 305,170" fill="var(--color-bronze)" stroke="#8c4800" strokeWidth="1" />
                <polygon points="315,195 328,190 308,185" fill="var(--color-bronze)" stroke="#8c4800" strokeWidth="1" />

                {/* Heavy Collar Neck Guard */}
                <path d="M145 160 L255 160 L235 185 L165 185 Z" fill="var(--color-bronze)" stroke="#8c4800" strokeWidth="2" />

                {/* Heavy Breastplate (Trapezoidal armor body) */}
                <polygon points="135,185 265,185 285,285 115,285" fill="var(--color-gold)" stroke="var(--color-bronze)" strokeWidth="4" />

                {/* Plated Abdomen (Dwarf style segmentation) */}
                <polygon points="120,285 280,285 272,315 128,315" fill="var(--color-bronze)" stroke="#8c4800" strokeWidth="2.5" />
                <polygon points="128,315 272,315 260,345 140,345" fill="var(--color-gold)" stroke="var(--color-bronze)" strokeWidth="2.5" />

                {/* 2. 은행_휘장 (Chest Center Coin & Scales emblem) */}
                <circle cx="200" cy="222" r="22" fill="#2d1703" stroke="var(--color-gold)" strokeWidth="2.5" />
                <circle cx="200" cy="222" r="18" fill="var(--color-bronze)" />
                {/* Scales inside emblem */}
                <line x1="200" y1="210" x2="200" y2="231" stroke="var(--color-gold)" strokeWidth="2.5" />
                <line x1="188" y1="216" x2="212" y2="216" stroke="var(--color-gold)" strokeWidth="2.5" />
                <line x1="188" y1="216" x2="188" y2="225" stroke="var(--color-gold)" strokeWidth="1.5" />
                <line x1="212" y1="216" x2="212" y2="225" stroke="var(--color-gold)" strokeWidth="1.5" />
                <circle cx="188" cy="225" r="3.5" fill="var(--color-ruby)" />
                <circle cx="212" cy="225" r="3.5" fill="var(--color-ruby)" />

                {/* 8. Dominant Accent '심장' (Heart emblem - pulsing at cx=200, cy=252) */}
                <g className="pulse-heart">
                  {/* Outer glow heart path */}
                  <path d="M12,5 C10.5,3.5 8,3.5 6.5,5 C5,6.5 5,9 6.5,10.5 L12,16 L17.5,10.5 C19,9 19,6.5 17.5,5 C16,3.5 13.5,3.5 12,5 Z" 
                        fill="var(--color-ruby)" 
                        transform="translate(188, 244) scale(1.0)" />
                </g>
              </g>
            </svg>
          </div>

          {/* 5. Level Tier stars */}
          <div className="level-tier-stars">
            {renderStars()}
          </div>

          {/* 9. 7 Stats display with hover tooltips */}
          <div className="stats-panel">
            {Object.entries(stats).map(([statName, val]) => {
              const isDominant = statName === dominantStat;
              const isEstimated = estimatedBadge.stats.includes(statName);
              const prov = provenance[statName];
              
              // Map stat names to Korean labels
              const labelMap = {
                "HP": "HP",
                "ATK": "ATK (공격)",
                "DEF": "DEF (방어)",
                "SPD": "SPD (속도)",
                "CRIT": "CRIT (치명)",
                "REGEN": "REGEN (재생)",
                "숙련": "숙련도"
              };

              return (
                <div key={statName} className={`stat-row ${isDominant ? 'dominant' : ''}`}>
                  <div className="stat-label-container">
                    <div className="stat-name-box">
                      <span className="stat-highlight">{labelMap[statName]}</span>
                      {isEstimated && (
                        <span className="estimated-pill" title="클릭하여 데이터 원천 보기">추정</span>
                      )}
                    </div>
                    <span className="stat-value">{val}</span>
                  </div>
                  <div className="stat-bar-bg">
                    <div 
                      className="stat-bar-fill" 
                      style={{ width: `${(val / 1000) * 100}%` }}
                    />
                  </div>

                  {/* 10. Interactive Provenance Tooltip (Shown on Hover/Focus) */}
                  {prov && (
                    <div className="provenance-tooltip">
                      <div className="tooltip-header">
                        <span>{prov.stat} Provenance Trail</span>
                        {prov.estimated && <span>추정값</span>}
                      </div>
                      <div className="tooltip-body">
                        <div className="tooltip-item">
                          <span className="tooltip-label">스탯 축 (Axis):</span>
                          <span className="tooltip-value">{prov.axis}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">지표 (Metric):</span>
                          <span className="tooltip-value">{prov.source_metric}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">섹터 백분위:</span>
                          <span className="tooltip-value">{(prov.sector_percentile * 100).toFixed(2)}%</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">레벨 배율:</span>
                          <span className="tooltip-value">{prov.lvl_mult.toFixed(4)}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">기본 스탯 (Base):</span>
                          <span className="tooltip-value">{prov.base_value}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">원천 수치 (Raw):</span>
                          <span className="tooltip-value">
                            {prov.raw_value === null ? "None" : (typeof prov.raw_value === 'object' ? JSON.stringify(prov.raw_value) : prov.raw_value.toString())}
                          </span>
                        </div>
                        <div className="tooltip-note">
                          <strong>Note:</strong> {prov.note}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* 10. Footer with Race name and subfaction description */}
          <div className="card-footer">
            <h2 className="card-race-title">{race}</h2>
            <div className="card-subfaction-desc">{spec.subfaction} 분파 ({spec.ticker})</div>
          </div>
        </div>
      );
    }

    // App wrapper
    function App() {
      return (
        <div style={{ display: 'flex', gap: '30px', flexWrap: 'wrap', justifyContent: 'center' }}>
          <CharacterCard spec={jpmSpec} />
        </div>
      );
    }

    // Render the App
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);

  </script>
</body>
</html>
