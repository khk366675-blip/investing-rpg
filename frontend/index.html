    /* CSS Variables & Base Styles */
    :root {
      --bg-gradient: radial-gradient(circle at center, #0a0d14 0%, #020305 100%);
      --card-bg: linear-gradient(135deg, rgba(14, 18, 28, 0.92) 0%, rgba(6, 8, 12, 0.99) 100%);
      --color-text-primary: #f8fafc;
      --color-text-secondary: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      color: var(--color-text-primary);
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      padding: 3rem 1.5rem;
    }

    header {
      margin-bottom: 3rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.6rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, #fff 40%, #ffdf00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--color-text-secondary);
      font-size: 1rem;
    }

    /* Grid Layout for all 11 races + ETF */
    .compare-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1550px;
      margin: 0 auto;
      justify-content: center;
    }

    /* Card Container with Dynamic Color Variable Borders */
    .card-container {
      width: 350px;
      height: 645px;
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 
                  0 0 18px var(--color-primary-glow);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
    }

    /* Double border effect for Legendary/Rarity Frame using color variables */
    .card-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 24px;
      padding: 2.5px;
      background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 50%, var(--color-accent) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /* Custom Frame Overrides for Common/Rare rarity */
    .card-container.common::before {
      background: linear-gradient(135deg, #475569 0%, #334155 100%);
    }
    .card-container.common {
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
    }

    .card-container:hover {
      transform: translateY(-10px) scale(1.015);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 
                  0 0 35px var(--color-primary);
    }
    .card-container.common:hover {
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 15px rgba(255,255,255,0.1);
    }

    /* Swapped Text Layout Header */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 10;
    }

    .title-section {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    /* Race name is MAIN */
    .race-main-title {
      font-size: 1.35rem;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .ticker-sub-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Ticker name is SUB-MAIN */
    .ticker-sub-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--color-primary);
      text-shadow: 0 0 8px var(--color-primary-glow);
    }

    .sector-badge {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--color-text-secondary);
      background: rgba(255, 255, 255, 0.05);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .rarity-tag {
      font-family: 'Outfit', sans-serif;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--color-primary);
      text-shadow: 0 0 8px var(--color-primary-glow);
      border: 1.5px solid var(--color-primary);
      padding: 2.5px 7px;
      border-radius: 6px;
      background: var(--color-primary-glow);
    }
    .card-container.common .rarity-tag {
      color: #94a3b8;
      border-color: #475569;
      background: rgba(71,85,105,0.2);
      text-shadow: none;
    }

    /* Character Graphic Viewport */
    .card-graphic-wrapper {
      width: 100%;
      height: 250px;
      background: radial-gradient(circle at center, rgba(16, 20, 30, 0.5) 0%, rgba(4, 5, 8, 0.95) 100%);
      border-radius: 16px;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Glowing Radial Aura using variables */
    .aura-circle {
      fill: url(#auraGlow);
    }

    /* Keyframe Animations */
    @keyframes pulse {
      0% { transform: scale(1); filter: drop-shadow(0 0 2px var(--color-accent)); }
      50% { transform: scale(1.15); filter: drop-shadow(0 0 10px var(--color-accent)); }
      100% { transform: scale(1); filter: drop-shadow(0 0 2px var(--color-accent)); }
    }
    
    .pulse-heart {
      animation: pulse 1.8s infinite ease-in-out;
      transform-origin: 200px 242px;
    }
    
    .pulse-heart-giant {
      animation: pulse 1.8s infinite ease-in-out;
      transform-origin: 200px 282px;
    }

    /* Level Stars */
    .level-tier-stars {
      display: flex;
      justify-content: center;
      gap: 4px;
      z-index: 10;
    }

    .star-icon {
      width: 14px;
      height: 14px;
      fill: var(--color-primary);
      filter: drop-shadow(0 0 4px var(--color-primary-glow));
    }
    .card-container.common .star-icon {
      fill: #64748b;
      filter: none;
    }

    /* Stats Panel */
    .stats-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .stat-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
    }

    .stat-label-container {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--color-text-secondary);
    }

    .stat-name-box {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-highlight {
      color: #fff;
      font-weight: 700;
    }

    .stat-value {
      font-weight: 700;
      color: var(--color-text-primary);
    }

    /* Stat bar */
    .stat-bar-bg {
      width: 100%;
      height: 5px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2.5px;
      overflow: hidden;
      position: relative;
    }

    .stat-bar-fill {
      height: 100%;
      border-radius: 2.5px;
      background: #475569;
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Dominant Stat HP highlight */
    .stat-row.dominant .stat-highlight {
      color: var(--color-primary);
      text-shadow: 0 0 8px var(--color-primary-glow);
    }

    .stat-row.dominant .stat-bar-fill {
      background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-accent) 100%);
      box-shadow: 0 0 10px var(--color-primary-glow);
    }

    /* Estimated badge for DEF */
    .estimated-pill {
      font-size: 0.62rem;
      font-weight: 700;
      color: var(--color-accent);
      background: var(--color-accent-glow);
      border: 1px solid var(--color-accent);
      padding: 0 3px;
      border-radius: 3px;
      cursor: help;
    }

    /* Interactive Provenance Tooltip */
    .provenance-tooltip {
      position: absolute;
      top: -245px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      width: 300px;
      background: rgba(8, 11, 18, 0.99);
      border: 1.5px solid var(--color-accent);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8), 0 0 20px var(--color-accent-glow);
      border-radius: 12px;
      padding: 14px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    .stat-row:hover .provenance-tooltip {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    .tooltip-header {
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 6px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tooltip-header span:first-child {
      font-size: 0.65rem;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--color-accent);
      color: #000;
      font-weight: 800;

    .tooltip-body {

      line-height: 1.45;

      flex-direction: column;
      gap: 5px;
      color: #cbd5e1;

    .tooltip-item {
      display: flex;
      justify-content: space-between;
    }

    .tooltip-label {
      color: var(--color-text-secondary);
    }

    .tooltip-value {
      font-weight: 600;
      color: #f1f5f9;
    }

    .tooltip-note {
      margin-top: 5px;
      padding-top: 5px;
      border-top: 1px dashed rgba(255, 255, 255, 0.08);
      font-size: 0.68rem;
      color: #94a3b8;
      font-style: italic;

      align-items: center;

    .card-type-label {
      font-size: 0.68rem;
      color: var(--color-text-secondary);
      margin-top: 1px;
      letter-spacing: 0.08em;
    }

        return (
          <g className="pulse-heart">
            <path d="M12,5 C10.5,3.5 8,3.5 6.5,5 C5,6.5 5,9 6.5,10.5 L12,16 L17.5,10.5 C19,9 19,6.5 17.5,5 C16,3.5 13.5,3.5 12,5 Z" 
                  fill="var(--color-accent)" 
                  transform="translate(188, 244) scale(1.0)" />
          </g>
        );
      } else if (dominantStat === "DEF") {
        // Shield Accent
        return (
          <polygon points="187,252 213,252 219,267 200,277 181,267" fill="var(--color-accent)" filter="url(#visorGlow)" />
        );
      } else if (dominantStat === "CRIT") {
        // Eyepatch Accent over one eye
        return (
          <g>
            <line x1="184" y1="120" x2="204" y2="135" stroke="var(--color-accent)" strokeWidth="2.5" filter="url(#visorGlow)" />
            <circle cx="194" cy="127" r="4.5" fill="var(--color-accent)" />
          </g>
        );
      } else if (dominantStat === "ATK") {
        // Sword Accent on back
        return (
          <g>
            <line x1="140" y1="280" x2="260" y2="100" stroke="var(--color-accent)" strokeWidth="3" filter="url(#visorGlow)" />
            <line x1="230" y1="130" x2="245" y2="145" stroke="var(--color-secondary)" strokeWidth="4" />
          </g>
        );
      } else if (dominantStat === "SPD") {
        // Energy Wings Accent on sides
        return (
          <g>
            <path d="M150 170 Q95 130 85 190 Q120 200 160 190 Z" fill="var(--color-accent)" filter="url(#visorGlow)" opacity="0.8" />
            <path d="M250 170 Q305 130 315 190 Q280 200 240 190 Z" fill="var(--color-accent)" filter="url(#visorGlow)" opacity="0.8" />
          </g>
        );
      } else if (dominantStat === "REGEN") {
        // Holy droplet Accent
        return (
          <path d="M200 252 C194 252 190 257 190 262 C190 268 200 277 200 277 C200 277 210 268 210 262 C210 257 206 252 200 252 Z" fill="var(--color-accent)" filter="url(#visorGlow)" />
        );
      }
      return null;
    }

    // React Character Card Component
    function CharacterCard({ spec }) {
      const {
        ticker,
        race,
        sectorLabel,
        size,
        aura,
        levelTier,
        rarityFrame,
        dominantStat,
        estimatedBadge,
        stats,
        provenance
      } = spec;

      // Hex mappings
      const primaryColor = colorMap[spec.palette.primary] || "#475569";
      const secondaryColor = colorMap[spec.palette.secondary] || "#64748b";
      const accentColor = colorMap[spec.palette.accent] || "#e2e8f0";

      // Inline card styles utilizing CSS Variables scoped to the card
      const cardStyle = {
        "--color-primary": primaryColor,
        "--color-secondary": secondaryColor,
        "--color-accent": accentColor,
        "--color-primary-glow": `${primaryColor}26`, /* opacity 0.15 */
        "--color-accent-glow": `${accentColor}1a`,  /* opacity 0.1 */
      };

      const renderStars = () => {
        const stars = [];
        for (let i = 0; i < levelTier; i++) {
          stars.push(<Star key={i} />);
        }
        return stars;
      };

      return (
        <div className={`card-container ${rarityFrame}`} style={cardStyle}>
          {/* Swapped Text Layout: Race MAIN, Ticker SUB-MAIN */}
          <div className="card-header">
            <div className="title-section">
              <h2 className="race-main-title">{race}</h2>
              <div className="ticker-sub-row">
                <span className="ticker-sub-title">{ticker}</span>
                <span className="sector-badge">{sectorLabel}</span>
              </div>
            </div>
            <div className="rarity-tag">{rarityFrame.toUpperCase()}</div>
          </div>

          {/* Graphic Viewport */}
          <div className="card-graphic-wrapper">
            <svg width="100%" height="100%" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
              <defs>
                {/* Aura gradient glow based on spec.aura */}
                <radialGradient id="auraGlow" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stopColor="var(--color-accent)" stopOpacity={aura} />
                  <stop offset="40%" stopColor="var(--color-primary)" stopOpacity={aura * 0.5} />
                  <stop offset="100%" stopColor="#000" stopOpacity="0" />
                </radialGradient>
                
                {/* Visor glowing filter */}
                <filter id="visorGlow" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur stdDeviation="3" result="blur" />
                  <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                  </feMerge>
                </filter>
              </defs>

              {/* Aura Background */}
              <circle cx="200" cy="200" r="165" className="aura-circle" />

              {/* Character Silhouettes (Split based on raceBodyType) */}
              <CharacterSilhouette 
                raceBodyType={spec.raceBodyType} 
                size={size} 
                aura={aura} 
              />

              {/* Subfaction Emblems in SVG */}
              <SubfactionEmblem subfaction={spec.subfaction} />

              {/* Dominant Stat Accent symbols */}
              <DominantAccent dominantStat={dominantStat} />
            </svg>
          </div>

          {/* Level Stars */}
          <div className="level-tier-stars">
            {renderStars()}
          </div>

          {/* Stats list & hovers */}
          <div className="stats-panel">
            {Object.entries(stats).map(([statName, val]) => {
              const isDominant = statName === dominantStat;
              const isEstimated = estimatedBadge.stats.includes(statName);
              const prov = provenance[statName];
              
              const labelMap = {
                "HP": "HP",
                "ATK": "ATK (공격)",
                "DEF": "DEF (방어)",
                "SPD": "SPD (속도)",
                "CRIT": "CRIT (치명)",
                "REGEN": "REGEN (재생)",
                "숙련": "숙련도"
              };

              return (
                <div key={statName} className={`stat-row ${isDominant ? 'dominant' : ''}`}>
                  <div className="stat-label-container">
                    <div className="stat-name-box">
                      <span className="stat-highlight">{labelMap[statName]}</span>
                      {isEstimated && (
                        <span className="estimated-pill">추정</span>
                      )}
                    </div>
                    <span className="stat-value">{val}</span>
                  </div>
                  <div className="stat-bar-bg">
                    <div 
                      className="stat-bar-fill" 
                      style={{ width: `${(val / 1000) * 100}%` }}
                    />
                  </div>

                  {/* Floating Provenance Tooltip */}
                  {prov && (
                    <div className="provenance-tooltip">
                      <div className="tooltip-header">
                        <span>{prov.stat} Provenance Trail</span>
                        {prov.estimated && <span>추정값</span>}
                      </div>
                      <div className="tooltip-body">
                        <div className="tooltip-item">
                          <span className="tooltip-label">스탯 축 (Axis):</span>
                          <span className="tooltip-value">{prov.axis}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">지표 (Metric):</span>
                          <span className="tooltip-value">{prov.source_metric}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">섹터 백분위:</span>
                          <span className="tooltip-value">{(prov.sector_percentile * 100).toFixed(2)}%</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">레벨 배율:</span>
                          <span className="tooltip-value">{prov.lvl_mult.toFixed(4)}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">기본 능력치 (Base):</span>
                          <span className="tooltip-value">{prov.base_value}</span>
                        </div>
                        <div className="tooltip-item">
                          <span className="tooltip-label">원천 수치 (Raw):</span>
                          <span className="tooltip-value">
                            {prov.raw_value === null ? "None" : (typeof prov.raw_value === 'object' ? JSON.stringify(prov.raw_value) : prov.raw_value.toString())}
                          </span>
                        </div>
                        <div className="tooltip-note">
                          <strong>Note:</strong> {prov.note}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Subfaction & Type labels in Footer */}
          <div className="card-footer">
            <div className="card-subfaction-desc">{spec.subfaction} 분파 ({spec.ticker})</div>
            <div className="card-type-label">{spec.type}</div>
          </div>
        </div>
      );
    }

    // App view rendering all 12 cards in a grid
    function App() {
      const tickers = ["JPM", "NVDA", "LLY", "RIVN", "KO", "GE", "XOM", "FCX", "SEG", "NEE", "META", "SPY"];
      return (
        <div className="compare-container">
          {tickers.map(ticker => (
            <CharacterCard key={ticker} spec={portfolioSpecs[ticker]} />
          ))}
        </div>
      );
    }

    // Mount point
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);

  </script>
</body>
</html>
